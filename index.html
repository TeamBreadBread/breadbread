<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>빵빵 Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Docsify theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <!-- Docsify renders markdown here -->
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'BreadBread Docs',
      repo: 'https://github.com/TeamBreadBread/breadbread',
      loadSidebar: true,   // Use SUMMARY.md as the sidebar
      subMaxLevel: 2,      // Display up to h2 in the sidebar
      auto2top: true,      // Scroll to top on page navigation
    }
  </script>

  <!-- Docsify script -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
