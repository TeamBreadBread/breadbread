services:
  db:
    image: pgvector/pgvector:pg16
    container_name: breadbread-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-bread}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bread1234}
      POSTGRES_DB: ${DB_NAME:-breaddb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
