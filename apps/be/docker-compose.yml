services:
  db:
    image: postgres:16-alpine
    container_name: breadbread-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-bread}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bread1234}
      POSTGRES_DB: ${DB_NAME:-breaddb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: breadbread-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
