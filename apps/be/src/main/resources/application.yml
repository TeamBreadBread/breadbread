spring:
  application:
    name: breadbread

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:breaddb}
    username: ${DB_USERNAME:bread}
    password: ${DB_PASSWORD:bread1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  security:
    enabled: false  # 개발 중 임시 비활성화

jwt:
  secret: ${JWT_SECRET}
  expires-in: ${JWT_EXPIRES_IN:3600}
  refresh-secret: ${JWT_REFRESH_SECRET}
  refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:604800}

server:
  port: ${PORT:8080}
