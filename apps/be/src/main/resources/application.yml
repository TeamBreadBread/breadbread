spring:
  application:
    name: breadbread
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:breaddb}
    username: ${DB_USERNAME:bread}
    password: ${DB_PASSWORD:bread1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:your-project-id}
      sql:
        enabled: false

  servlet:
    multipart:
      max-file-size: 10MB        # 파일 1개당 최대 크기
      max-request-size: 50MB    # 요청 전체 크기 (여러 파일)
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}

gcs:
  bucket: ${GCS_BUCKET:your-bucket-name}

jwt:
  secret: ${JWT_SECRET:temp-access-secret-key-minimum-32-characters-x}
  expires-in: ${JWT_EXPIRES_IN:3600}
  refresh-secret: ${JWT_REFRESH_SECRET:temp-refresh-secret-key-minimum-32-characters-x}
  refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:604800}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}

coolsms:
  api:
    key: ${COOLSMS_API_KEY:temp-api-key}
    secret: ${COOLSMS_API_SECRET:temp-api-secret}
    sender: ${COOLSMS_SENDER:"01000000000"}

phone-verification: # 초 단위
  code-expires-in: ${PHONE_CODE_EXPIRES_IN:300}
  token-expires-in: ${PHONE_TOKEN_EXPIRES_IN:600}

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    allowed-redirect-uris:
      - http://localhost:3000/auth/google/callback
      - https://breadbread.pages.dev/auth/google/callback
      - https://www.breadbread.io/auth/google/callback
    use-pkce: true

  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    allowed-redirect-uris:
      - http://localhost:3000/auth/naver/callback
      - https://breadbread.pages.dev/auth/naver/callback
      - https://www.breadbread.io/auth/naver/callback
    use-pkce: false

  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    allowed-redirect-uris:
      - http://localhost:3000/auth/kakao/callback
      - https://breadbread.pages.dev/auth/kakao/callback
      - https://www.breadbread.io/auth/kakao/callback
    use-pkce: true

ai:
  webhook-url: ${AI_COURSE_WEBHOOK_URL}
  webhook-timeout-seconds: ${AI_WEBHOOK_TIMEOUT_SECONDS:60}
  job-ttl-hours: ${AI_JOB_TTL_HOURS:1}

