spring:
  application:
    name: breadbread

  flyway:
    # H2 + PostgreSQL 덤프(V1__init.sql)는 호환되지 않음 — 통합 테스트는 JPA ddl-auto로 스키마 생성
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

jwt:
  secret: test-secret-key-minimum-32-characters-long
  expires-in: 900000
  refresh-secret: test-refresh-key-minimum-32-characters-long
  refresh-expires-in: 604800000

coolsms:
  api:
    key: test-key
    secret: test-secret
    sender: "01000000000"
    expires-in: 300

ai:
  webhook-url: http://localhost/test-ai-webhook
