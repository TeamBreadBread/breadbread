info:
  title: 빵빵 (BreadBread) API
  description: 빵빵 택시 서비스 API 명세서
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    BannerDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        imageUrl:
          type: string
          example: https://cdn.breadbread.kr/banners/spring-event.jpg
        linkUrl:
          type: string
          example: https://breadbread.kr/events/spring
      required:
        - id
        - imageUrl
        - linkUrl
    CourseSummaryDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: 은행동 빵지순례 코스
        thumbnailUrl:
          type: string
          example: https://cdn.breadbread.kr/courses/yeonnam.jpg
        bakeryCount:
          type: number
          example: 4
        estimatedTime:
          type: number
          description: 예상 소요 시간 (분)
          example: 120
      required:
        - id
        - name
        - thumbnailUrl
        - bakeryCount
        - estimatedTime
    BakerySummaryDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: 르뺑 베이커리
        address:
          type: string
          example: 대전시 중구 은행동 123-4
        lat:
          type: number
          format: double
          example: 36.328
        lng:
          type: number
          format: double
          example: 127.4272
        thumbnailUrl:
          type: string
          example: https://cdn.breadbread.kr/bakeries/lepain.jpg
      required:
        - id
        - name
        - address
        - lat
        - lng
        - thumbnailUrl
    MainResponseDto:
      type: object
      properties:
        banners:
          type: array
          items:
            $ref: '#/components/schemas/BannerDto'
        recommendedCourses:
          type: array
          items:
            $ref: '#/components/schemas/CourseSummaryDto'
        popularBakeries:
          type: array
          items:
            $ref: '#/components/schemas/BakerySummaryDto'
      required:
        - banners
        - recommendedCourses
        - popularBakeries
    LoginRequestDto:
      type: object
      properties:
        loginId:
          type: string
          example: user123
        password:
          type: string
          example: password123!
      required:
        - loginId
        - password
    TokenResponseDto:
      type: object
      properties:
        accessToken:
          type: string
          example: >-
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwiaWF0IjoxNzAwMDAwMDAwfQ.abc123
        refreshToken:
          type: string
          example: >-
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwiaWF0IjoxNzAwMDAwMDAwfQ.refresh123
        tokenType:
          type: string
          default: Bearer
          example: Bearer
      required:
        - accessToken
        - refreshToken
        - tokenType
    RefreshRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh123
      required:
        - refreshToken
    SocialLoginRequestDto:
      type: object
      properties:
        accessToken:
          type: string
          example: ya29.a0AfH6SMBx...
      required:
        - accessToken
    SendPhoneRequestDto:
      type: object
      properties:
        phone:
          type: string
          example: '01012345678'
      required:
        - phone
    VerifyPhoneRequestDto:
      type: object
      properties:
        phone:
          type: string
          example: '01012345678'
        code:
          type: string
          example: '123456'
      required:
        - phone
        - code
    VerifyPhoneResponseDto:
      type: object
      properties:
        verificationToken:
          type: string
          description: 휴대폰 인증 완료 토큰
          example: verify_token_abc123
      required:
        - verificationToken
    SignupRequestDto:
      type: object
      properties:
        loginId:
          type: string
          example: user123
        password:
          type: string
          format: password
          example: password123!
        name:
          type: string
          example: 홍길동
        email:
          type: string
          example: user@example.com
          format: email
        phone:
          type: string
          example: '01012345678'
        verificationToken:
          type: string
          description: 휴대폰 인증 완료 토큰
          example: verify_token_abc123
        role:
          type: string
          enum:
            - USER
            - BUSINESS
            - DRIVER
          description: 가입 역할 (일반 사용자/사업자/기사)
          example: USER
      required:
        - loginId
        - password
        - name
        - email
        - phone
        - verificationToken
        - role
    CheckIdResponseDto:
      type: object
      properties:
        available:
          type: boolean
          example: true
      required:
        - available
    FindIdResponseDto:
      type: object
      properties:
        loginId:
          type: string
          example: user123
      required:
        - loginId
    ResetPwRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
      required:
        - email
    ConfirmResetPwRequestDto:
      type: object
      properties:
        token:
          type: string
          example: reset_token_xyz789
        newPassword:
          type: string
          example: newPassword123!
      required:
        - token
        - newPassword
    UserProfileDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        loginId:
          type: string
          example: user123
        name:
          type: string
          example: 홍길동
        email:
          type: string
          example: user@example.com
        phone:
          type: string
          example: '01012345678'
        role:
          type: string
          enum:
            - USER
            - BUSINESS
            - DRIVER
          example: USER
        createdAt:
          type: string
          format: date-time
          example: '2026-01-15T09:00:00.000Z'
      required:
        - id
        - loginId
        - name
        - email
        - phone
        - role
        - createdAt
    UpdateProfileRequestDto:
      type: object
      properties:
        name:
          type: string
          example: 김철수
        email:
          type: string
          format: email
          example: new@example.com
        phone:
          type: string
          example: '01098765432'
    BakeryListResponseDto:
      type: object
      properties:
        bakeries:
          type: array
          items:
            $ref: '#/components/schemas/BakerySummaryDto'
        total:
          type: number
          example: 42
      required:
        - bakeries
        - total
    BakeryMenuDto:
      type: object
      properties:
        name:
          type: string
          example: 크루아상
        price:
          type: number
          example: 4500
        imageUrl:
          type: string
          example: https://cdn.breadbread.kr/menus/croissant.jpg
      required:
        - name
        - price
        - imageUrl
    BakeryDetailDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: 르뺑 베이커리
        address:
          type: string
          example: 대전시 중구 은행동 123-4
        lat:
          type: number
          format: double
          example: 36.328
        lng:
          type: number
          format: double
          example: 127.4272
        thumbnailUrl:
          type: string
          example: https://cdn.breadbread.kr/bakeries/lepain.jpg
        description:
          type: string
          example: 은행동 골목에 위치한 프랑스식 베이커리입니다.
        openHours:
          type: string
          example: 08:00 - 21:00
        phone:
          type: string
          example: 02-1234-5678
        menus:
          type: array
          items:
            $ref: '#/components/schemas/BakeryMenuDto'
      required:
        - id
        - name
        - address
        - lat
        - lng
        - thumbnailUrl
        - description
        - openHours
        - phone
        - menus
    CourseListResponseDto:
      type: object
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseSummaryDto'
        total:
          type: number
          example: 15
      required:
        - courses
        - total
    CourseDetailDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: 은행동 빵지순례 코스
        thumbnailUrl:
          type: string
          example: https://cdn.breadbread.kr/courses/yeonnam.jpg
        bakeryCount:
          type: number
          example: 4
        estimatedTime:
          type: number
          description: 예상 소요 시간 (분)
          example: 120
        description:
          type: string
          example: 은행동 핫플 빵집 4곳을 도는 인기 코스입니다.
        bakeries:
          type: array
          items:
            $ref: '#/components/schemas/BakerySummaryDto'
      required:
        - id
        - name
        - thumbnailUrl
        - bakeryCount
        - estimatedTime
        - description
        - bakeries
    RecommendLocationDto:
      type: object
      properties:
        lat:
          type: number
          format: double
          example: 36.328
        lng:
          type: number
          format: double
          example: 127.4272
      required:
        - lat
        - lng
    RecommendRequestDto:
      type: object
      properties:
        preferences:
          description: '사용자 선호도 (예: 달달한, 건강한, 비건)'
          example:
            - 달달한
            - 촉촉한
          type: array
          items:
            type: string
        maxTime:
          type: number
          description: 최대 이동 시간 (분)
          example: 90
        bakeryCount:
          type: number
          description: 방문할 빵집 수
          example: 3
        location:
          $ref: '#/components/schemas/RecommendLocationDto'
        allergies:
          description: 알러지 정보
          example:
            - 견과류
          type: array
          items:
            type: string
    ReservationSummaryDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        courseName:
          type: string
          example: 연남동 빵지순례 코스
        reservationTime:
          type: string
          format: date-time
          example: '2026-04-10T14:00:00.000Z'
        status:
          type: string
          enum: &ref_8
            - PENDING
            - CONFIRMED
            - CANCELLED
            - COMPLETED
          example: CONFIRMED
        createdAt:
          type: string
          format: date-time
          example: '2026-03-28T10:00:00.000Z'
      required:
        - id
        - courseName
        - reservationTime
        - status
        - createdAt
    ReservationListResponseDto:
      type: object
      properties:
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/ReservationSummaryDto'
      required:
        - reservations
    CreateReservationRequestDto:
      type: object
      properties:
        courseId:
          type: number
