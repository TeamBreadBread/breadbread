        headCount:
          type: number
          minimum: 1
          example: 2
      required:
        - courseId
        - reservationTime
        - headCount
    ReservationDetailDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        courseName:
          type: string
          example: 연남동 빵지순례 코스
        reservationTime:
          type: string
          format: date-time
          example: '2026-04-10T14:00:00.000Z'
        status:
          type: string
          enum: *ref_8
