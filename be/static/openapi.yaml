info:
  title: 빵빵 (BreadBread) API
  description: 빵빵 택시 서비스 API 명세서
  version: 1.0.0
  contact: {}
tags: []
servers:
  - url: https://bread-be-72253678429.asia-northeast3.run.app
    description: Production Server (Cloud Run)
  - url: http://localhost:8080
    description: Local Development Server
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    BannerDto:
      type: object
      properties:
        id:
          type: number
        imageUrl:
          type: string
        linkUrl:
          type: string
      required:
        - id
        - imageUrl
        - linkUrl
    CourseSummaryDto:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        thumbnailUrl:
          type: string
        bakeryCount:
          type: number
        estimatedTime:
          type: number
          description: 예상 소요 시간 (분)
      required:
        - id
        - name
        - thumbnailUrl
        - bakeryCount
        - estimatedTime
    BakerySummaryDto:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        address:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        thumbnailUrl:
          type: string
      required:
        - id
        - name
        - address
        - lat
        - lng
        - thumbnailUrl
    MainResponseDto:
      type: object
      properties:
        banners:
          type: array
          items:
            $ref: '#/components/schemas/BannerDto'
        recommendedCourses:
          type: array
          items:
            $ref: '#/components/schemas/CourseSummaryDto'
        popularBakeries:
          type: array
          items:
            $ref: '#/components/schemas/BakerySummaryDto'
      required:
        - banners
        - recommendedCourses
        - popularBakeries
    LoginRequestDto:
      type: object
      properties:
        loginId:
          type: string
          example: user123
        password:
          type: string
          example: password123
      required:
        - loginId
        - password
    TokenResponseDto:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
      required:
        - accessToken
        - refreshToken
        - tokenType
    RefreshRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    SocialLoginRequestDto:
      type: object
      properties:
        accessToken:
          type: string
          example: oauth_access_token
      required:
        - accessToken
    SendPhoneRequestDto:
      type: object
      properties:
        phone:
          type: string
          example: '01012345678'
      required:
        - phone
    VerifyPhoneRequestDto:
      type: object
      properties:
        phone:
          type: string
          example: '01012345678'
        code:
          type: string
          example: '123456'
      required:
        - phone
        - code
    VerifyPhoneResponseDto:
      type: object
      properties:
        verificationToken:
          type: string
          description: 휴대폰 인증 완료 토큰
      required:
        - verificationToken
    SignupRequestDto:
      type: object
      properties:
        loginId:
          type: string
          example: user123
        password:
          type: string
          format: password
        name:
          type: string
          example: 홍길동
        email:
          type: string
          example: user@example.com
          format: email
        phone:
          type: string
          example: '01012345678'
        verificationToken:
          type: string
          description: 휴대폰 인증 완료 토큰
        role:
          enum:
            - USER
            - BUSINESS
            - DRIVER
          type: string
          description: 가입 역할 (일반 사용자/사업자/기사)
      required:
        - loginId
        - password
        - name
        - email
        - phone
        - verificationToken
        - role
    CheckIdResponseDto:
      type: object
      properties:
        available:
          type: boolean
      required:
        - available
    FindIdResponseDto:
      type: object
      properties:
        loginId:
          type: string
      required:
        - loginId
    ResetPwRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ConfirmResetPwRequestDto:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
      required:
        - token
        - newPassword
    UserProfileDto:
      type: object
      properties:
        id:
          type: number
        loginId:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          enum:
            - USER
            - BUSINESS
            - DRIVER
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - loginId
        - name
        - email
        - phone
        - role
        - createdAt
    UpdateProfileRequestDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
    BakeryListResponseDto:
      type: object
      properties:
        bakeries:
          type: array
          items:
            $ref: '#/components/schemas/BakerySummaryDto'
        total:
          type: number
      required:
        - bakeries
        - total
    BakeryMenuDto:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        imageUrl:
          type: string
      required:
        - name
        - price
        - imageUrl
    BakeryDetailDto:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        address:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        thumbnailUrl:
          type: string
        description:
          type: string
        openHours:
          type: string
        phone:
          type: string
        menus:
          type: array
          items:
            $ref: '#/components/schemas/BakeryMenuDto'
      required:
        - id
        - name
        - address
        - lat
        - lng
        - thumbnailUrl
        - description
        - openHours
        - phone
        - menus
    CourseListResponseDto:
      type: object
      properties:
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseSummaryDto'
        total:
          type: number
      required:
        - courses
        - total
    CourseDetailDto:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        thumbnailUrl:
          type: string
        bakeryCount:
          type: number
        estimatedTime:
          type: number
          description: 예상 소요 시간 (분)
        description:
          type: string
        bakeries:
