openapi: 3.0.3
info:
  title: 빵빵 (BreadBread) API
  description: 빵빵 택시 서비스 API 명세서
  version: 1.0.0
servers:
  - url: https://bread-be-72253678429.asia-northeast3.run.app
    description: Production Server (Cloud Run)
  - url: http://localhost:8080
    description: Local Development Server

tags:
  - name: 메인
    description: 메인 화면
  - name: 인증
    description: 로그인, 회원가입, 토큰 관련
  - name: 유저
    description: 사용자 정보 관련
  - name: 빵집
    description: 빵집 검색 및 조회
  - name: 코스
    description: 빵집 코스 관련
  - name: 예약
    description: 예약 관련
  - name: 결제
    description: 결제 관련
  - name: 빵뮤니티
    description: 커뮤니티 게시글 및 댓글
  - name: 위치
    description: 실시간 위치 추적
  - name: AI
    description: AI 에이전트 채팅
  - name: 알림
    description: 푸시 알림

paths:
  # =====================
  # 메인
  # =====================
  /api/main:
    get:
      tags: [메인]
      summary: 메인 화면 출력
      description: 메인 화면에 필요한 주요 정보(배너, 추천 코스, 인기 빵집 등)를 조회하는 API
      security: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  banners:
                    type: array
                    items:
                      $ref: '#/components/schemas/Banner'
                  recommendedCourses:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseSummary'
                  popularBakeries:
                    type: array
                    items:
                      $ref: '#/components/schemas/BakerySummary'

  # =====================
  # 인증
  # =====================
  /api/auth/login:
    post:
      tags: [인증]
      summary: 로그인
      description: 아이디와 비밀번호로 로그인하여 Access Token 및 Refresh Token을 발급받는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId:
                  type: string
                  example: user123
                password:
                  type: string
                  format: password
                  example: password123!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: 아이디 또는 비밀번호 불일치

  /api/auth/logout:
    post:
      tags: [인증]
      summary: 로그아웃
      description: Refresh Token을 무효화하여 로그아웃 처리하는 API
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 로그아웃 성공
        '401':
          description: 인증 필요

  /api/auth/refresh:
    post:
      tags: [인증]
      summary: 토큰 갱신
      description: Refresh Token으로 새로운 Access Token을 발급받는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: 유효하지 않은 Refresh Token

  /api/auth/{provider}:
    post:
      tags: [인증]
      summary: 소셜 로그인
      description: Kakao, Google OAuth2 소셜 로그인 API
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [kakao, google]
          description: 소셜 로그인 제공자
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessToken]
              properties:
                accessToken:
                  type: string
                  description: 소셜 플랫폼에서 발급받은 Access Token
      responses:
        '200':
          description: 소셜 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/auth/phone/send:
    post:
      tags: [인증]
      summary: 휴대전화 인증 요청
      description: 입력한 휴대전화 번호로 인증번호를 발송하는 API. 인증번호는 5분간 유효하며 동일 번호 재요청 시 제한이 있음
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: "01012345678"
      responses:
        '200':
          description: 인증번호 발송 성공
        '429':
          description: 재요청 제한 초과

  /api/auth/phone/verify:
    post:
      tags: [인증]
      summary: 휴대전화 인증 확인
      description: 발송된 인증번호를 검증하고 인증 완료 토큰을 발급하는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  example: "01012345678"
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 인증 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationToken:
                    type: string
                    description: 회원가입 시 사용할 인증 완료 토큰
        '400':
          description: 인증번호 불일치 또는 만료

  # =====================
  # 유저
  # =====================
  /api/users/signup:
    post:
      tags: [유저]
      summary: 회원가입
      description: 휴대폰 인증 완료 후 일반 사용자/사업자/기사 권한으로 가입하는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 회원가입 성공
        '400':
          description: 유효하지 않은 입력값 또는 중복된 아이디/이메일/전화번호
        '401':
          description: 유효하지 않은 휴대폰 인증 토큰

  /api/users/check-id:
    get:
      tags: [유저]
      summary: ID 중복 확인
      description: 회원가입 시 입력한 아이디의 중복 여부를 확인하는 API
      security: []
      parameters:
        - name: loginId
          in: query
          required: true
          schema:
            type: string
          description: 중복 확인할 아이디
      responses:
        '200':
          description: 중복 확인 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                    description: true면 사용 가능, false면 중복

  /api/users/find-id:
    get:
      tags: [유저]
      summary: ID 찾기
      description: 이름과 휴대폰 번호 또는 이메일로 가입된 아이디를 조회하는 API
      security: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: phone
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
      responses:
        '200':
          description: 아이디 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  loginId:
                    type: string
        '404':
          description: 일치하는 회원 정보 없음

  /api/users/reset-pw:
    post:
      tags: [유저]
      summary: PW 재설정 이메일 발송
      description: 가입된 이메일로 비밀번호 재설정 링크를 발송하는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: 재설정 이메일 발송 성공 (이메일 존재 여부 미노출)
    patch:
      tags: [유저]
      summary: PW 재설정
      description: 재설정 토큰과 새 비밀번호를 입력받아 비밀번호를 변경하는 API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  description: 비밀번호 재설정 토큰
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 유효하지 않거나 만료된 토큰

  /api/users/reset-pw/verify:
    get:
      tags: [유저]
      summary: PW 재설정 토큰 유효성 검사
      description: 비밀번호 재설정 링크의 토큰 유효 여부를 확인하는 API
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: 비밀번호 재설정용 토큰
      responses:
        '200':
          description: 유효한 토큰
        '400':
          description: 유효하지 않거나 만료된 토큰

  /api/users/me:
    get:
      tags: [유저]
      summary: 프로필 조회
      description: 로그인한 사용자의 프로필 정보를 조회하는 API
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 인증 필요
    patch:
      tags: [유저]
      summary: 프로필 수정
      description: 로그인한 사용자의 프로필 정보를 수정하는 API
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 인증 필요

  # =====================
  # 빵집
  # =====================
  /api/bakeries:
    get:
      tags: [빵집]
      summary: 빵집 검색
      description: 이름 또는 위치 기반으로 빵집 목록을 검색하는 API. 검색어 없으면 전체 목록 반환
      security: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: 검색할 빵집 이름
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 현재 위도 (위치 기반 검색 시)
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 현재 경도 (위치 기반 검색 시)
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 1000
          description: 검색 반경 (미터)
      responses:
        '200':
          description: 검색 결과
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BakerySummary'

  /api/bakeries/{bakeryId}:
    get:
      tags: [빵집]
      summary: 빵집 상세 조회
      description: 빵집 ID로 상세 정보(기본 정보, 위치, 대표 메뉴 등)를 조회하는 API
      security: []
      parameters:
        - name: bakeryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BakeryDetail'
        '404':
          description: 존재하지 않는 빵집

  # =====================
  # 코스
  # =====================
  /api/courses:
    get:
      tags: [코스]
      summary: 코스 탐색
      description: 지역별/종류별/에디터픽/테마 등 필터로 코스 목록을 조회하는 API (QueryDSL 사용)
      security: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [RECOMMEND, REGION, CATEGORY, EDITOR, THEME]
          description: 코스 탐색 타입
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseSummary'

  /api/courses/{courseId}:
    get:
      tags: [코스]
      summary: 코스 상세 조회
      description: 코스 ID로 코스 상세 정보(코스명, 포함 빵집 목록, 예상 소요 시간 등)를 조회하는 API
      security: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '404':
          description: 존재하지 않는 코스

  /api/courses/recommend:
    post:
      tags: [코스]
      summary: AI 코스 추천 생성
      description: 사용자 선호도, 이동 시간, 방문 개수 등을 기준으로 AI 추천 코스를 생성하는 API. 저장 전 미리보기 형태로 반환
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
      responses:
        '200':
          description: 추천 코스 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '401':
          description: 인증 필요

  /api/courses/recommend/retry:
    post:
      tags: [코스]
      summary: AI 코스 재추천 생성
      description: 기존 추천 조건을 바탕으로 AI 추천 코스를 다시 생성하는 API. 동일 조건이어도 다른 결과 반환 가능
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
      responses:
        '200':
          description: 재추천 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        '401':
          description: 인증 필요

  /api/courses/activate:
    post:
      tags: [코스]
      summary: 빵빵루트 활성화
      description: 선택한 코스를 사용자의 활성 코스로 설정하는 API. 기존 활성 코스가 있으면 새 코스로 변경됨
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: 활성화 성공
        '401':
          description: 인증 필요
        '404':
          description: 존재하지 않는 코스

  # =====================
  # 예약
  # =====================
  /api/reservations:
    get:
      tags: [예약]
      summary: 사용자 예약 목록 조회
      description: 로그인한 사용자의 예약 목록을 최신순으로 조회하는 API
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReservationSummary'
        '401':
          description: 인증 필요
    post:
      tags: [예약]
      summary: 코스 예약
      description: 선택한 코스와 예약 정보(시간, 인원 등)를 입력하여 예약을 생성하는 API
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: 예약 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
        '401':
          description: 인증 필요

  /api/reservations/{reservationId}:
    get:
      tags: [예약]
      summary: 예약 상세 조회
      description: 예약 ID로 특정 예약의 상세 정보를 조회하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음
        '404':
          description: 존재하지 않는 예약

  /api/reservations/{reservationId}/cancel:
    patch:
      tags: [예약]
      summary: 예약 취소
      description: 예약 ID로 해당 예약을 취소하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 취소 성공
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음
        '404':
          description: 존재하지 않는 예약

  # =====================
  # 결제
  # =====================
  /api/payments:
    post:
      tags: [결제]
      summary: 결제
      description: 예약에 대한 결제를 생성하는 API. 예약 결제 버튼 클릭 시 호출
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: 결제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetail'
        '401':
          description: 인증 필요
        '404':
          description: 존재하지 않는 예약

  /api/payments/{paymentId}/cancel:
    post:
      tags: [결제]
      summary: 결제 취소 / 환불
      description: 결제 ID로 결제를 취소 또는 환불 처리하는 API. 결제 내역에서 취소/환불 버튼 클릭 시 호출
      security:
        - BearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: 취소 사유
      responses:
        '200':
          description: 취소/환불 성공
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음
        '404':
          description: 존재하지 않는 결제

  # =====================
  # 빵뮤니티
  # =====================
  /api/posts:
    get:
      tags: [빵뮤니티]
      summary: 게시글 목록
      description: 빵뮤니티 게시글 목록을 조회하는 API
      security: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostSummary'
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
    post:
      tags: [빵뮤니티]
      summary: 게시글 작성
      description: 빵뮤니티에 새 게시글을 작성하는 API
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: 작성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '401':
          description: 인증 필요

  /api/posts/{postId}:
    get:
      tags: [빵뮤니티]
      summary: 게시글 상세
      description: 게시글 ID로 게시글 상세 내용을 조회하는 API
      security: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '404':
          description: 존재하지 않는 게시글
    put:
      tags: [빵뮤니티]
      summary: 게시글 수정
      description: 게시글을 수정하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음
    delete:
      tags: [빵뮤니티]
      summary: 게시글 삭제
      description: 게시글을 삭제하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 삭제 성공
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음

  /api/posts/{postId}/like:
    post:
      tags: [빵뮤니티]
      summary: 좋아요 토글
      description: 게시글 좋아요를 토글하는 API (좋아요 추가/취소)
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 토글 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                  likeCount:
                    type: integer
        '401':
          description: 인증 필요

  /api/posts/{postId}/comments:
    post:
      tags: [빵뮤니티]
      summary: 댓글 작성
      description: 게시글에 댓글을 작성하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '201':
          description: 댓글 작성 성공
        '401':
          description: 인증 필요

  /api/posts/{postId}/comments/{commentId}:
    patch:
      tags: [빵뮤니티]
      summary: 댓글 수정
      description: 댓글을 수정하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: 수정 성공
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음
    delete:
      tags: [빵뮤니티]
      summary: 댓글 삭제
      description: 댓글을 삭제하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 삭제 성공
        '401':
          description: 인증 필요
        '403':
          description: 접근 권한 없음

  # =====================
  # 위치
  # =====================
  /api/locations/driver:
    post:
      tags: [위치]
      summary: 기사 위치 업데이트
      description: 기사가 현재 위치를 서버에 전송하는 API (Polling 방식, 5초마다 호출)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng, reservationId]
              properties:
                lat:
                  type: number
                  format: double
                  description: 위도
                lng:
                  type: number
                  format: double
                  description: 경도
                reservationId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: 위치 업데이트 성공
        '401':
          description: 인증 필요

  /api/locations/driver/{reservationId}:
    get:
      tags: [위치]
      summary: 기사 위치 조회
      description: 예약 ID로 해당 기사의 현재 위치를 조회하는 API (승객이 호출)
      security:
        - BearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 위치 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  lat:
                    type: number
                    format: double
                  lng:
                    type: number
                    format: double
                  updatedAt:
                    type: string
                    format: date-time
        '401':
          description: 인증 필요
        '404':
          description: 위치 정보 없음

  # =====================
  # AI 에이전트
  # =====================
  /api/ai/chat:
    post:
      tags: [AI]
      summary: AI 에이전트 채팅
      description: 빵빵이 AI 에이전트와 대화하는 API. Dify SSE 스트리밍 응답을 통해 실시간으로 답변을 받음
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: 사용자 질문
                  example: "알러지가 있는데 근처 빵집 추천해줘"
                conversationId:
                  type: string
                  description: 이전 대화 ID (연속 대화 시)
      responses:
        '200':
          description: AI 응답 (SSE 스트리밍)
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: 인증 필요

  # =====================
  # 알림
  # =====================
  /api/notifications/token:
    post:
      tags: [알림]
      summary: 푸시 알림 토큰 등록
      description: PWA 푸시 알림을 위한 디바이스 토큰을 등록하는 API
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: FCM 또는 Web Push 토큰
                deviceType:
                  type: string
                  enum: [IOS, ANDROID, WEB]
      responses:
        '200':
          description: 토큰 등록 성공
        '401':
          description: 인증 필요

  /api/notifications:
    get:
      tags: [알림]
      summary: 알림 목록 조회
      description: 로그인한 사용자의 알림 목록을 조회하는 API
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          description: 인증 필요

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer

    SignupRequest:
      type: object
      required: [loginId, password, name, email, phone, verificationToken, role]
      properties:
        loginId:
          type: string
        password:
          type: string
          format: password
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        verificationToken:
          type: string
          description: 휴대폰 인증 완료 토큰
        role:
          type: string
          enum: [USER, BUSINESS, DRIVER]
          description: 가입 역할 (일반 사용자/사업자/기사)

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        loginId:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [USER, BUSINESS, DRIVER]
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    BakerySummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        thumbnailUrl:
          type: string

    BakeryDetail:
      allOf:
        - $ref: '#/components/schemas/BakerySummary'
        - type: object
          properties:
            description:
              type: string
            openHours:
              type: string
            phone:
              type: string
            menus:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  price:
                    type: integer
                  imageUrl:
                    type: string

    CourseSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        thumbnailUrl:
          type: string
        bakeryCount:
          type: integer
        estimatedTime:
          type: integer
          description: 예상 소요 시간 (분)

    CourseDetail:
      allOf:
        - $ref: '#/components/schemas/CourseSummary'
        - type: object
          properties:
            description:
              type: string
            bakeries:
              type: array
              items:
                $ref: '#/components/schemas/BakerySummary'

    RecommendRequest:
      type: object
      properties:
        preferences:
          type: array
          items:
            type: string
          description: "사용자 선호도 (예: 달달한, 건강한, 비건)"
        maxTime:
          type: integer
          description: 최대 이동 시간 (분)
        bakeryCount:
          type: integer
          description: 방문할 빵집 수
        location:
          type: object
          properties:
            lat:
              type: number
              format: double
            lng:
              type: number
              format: double
        allergies:
          type: array
          items:
            type: string
          description: 알러지 정보

    CreateReservationRequest:
      type: object
      required: [courseId, reservationTime, headCount]
      properties:
        courseId:
          type: integer
          format: int64
        reservationTime:
          type: string
          format: date-time
        headCount:
          type: integer
          minimum: 1

    ReservationSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        courseName:
          type: string
        reservationTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED, COMPLETED]
        createdAt:
          type: string
          format: date-time

    ReservationDetail:
      allOf:
        - $ref: '#/components/schemas/ReservationSummary'
        - type: object
          properties:
            course:
              $ref: '#/components/schemas/CourseDetail'
            headCount:
              type: integer
            totalPrice:
              type: integer

    CreatePaymentRequest:
      type: object
      required: [reservationId, paymentMethod]
      properties:
        reservationId:
          type: integer
          format: int64
        paymentMethod:
          type: string
          enum: [CARD, KAKAO_PAY, STRIPE]
        amount:
          type: integer

    PaymentDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        reservationId:
          type: integer
          format: int64
        amount:
          type: integer
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, CANCELLED, REFUNDED]
        paymentMethod:
          type: string
        paidAt:
          type: string
          format: date-time

    CreatePostRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        imageUrls:
          type: array
          items:
            type: string

    PostSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        authorName:
          type: string
        likeCount:
          type: integer
        commentCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    PostDetail:
      allOf:
        - $ref: '#/components/schemas/PostSummary'
        - type: object
          properties:
            content:
              type: string
            imageUrls:
              type: array
              items:
                type: string
            liked:
              type: boolean

    Banner:
      type: object
      properties:
        id:
          type: integer
          format: int64
        imageUrl:
          type: string
        linkUrl:
          type: string

    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [RESERVATION, PAYMENT, SYSTEM]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
