name: Deploy to Cloud Run
on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      IMAGE_REPO: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/breadbread/be
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and push to Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev
          docker build -t $IMAGE_REPO:${{ github.sha }} apps/be
          docker push $IMAGE_REPO:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: breadbread-be
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          image: ${{ env.IMAGE_REPO }}:${{ github.sha }}
          # v2: public ingress via flags (not allow-unauthenticated). Attach Cloud SQL so
          # the Postgres socket factory can connect; without it, Spring may exit before listening on PORT.
          # CLOUD_SQL_INSTANCE must be the instance id (last segment), same as in application-prod.yml.
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:${{ secrets.CLOUD_SQL_INSTANCE }}
            --cpu-boost
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_REGION=${{ secrets.GCP_REGION }}
            CLOUD_SQL_INSTANCE=${{ secrets.CLOUD_SQL_INSTANCE }}
            GCS_BUCKET=${{ secrets.GCS_BUCKET }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
            COOLSMS_API_KEY=${{ secrets.COOLSMS_API_KEY }}
            COOLSMS_API_SECRET=${{ secrets.COOLSMS_API_SECRET }}
            COOLSMS_SENDER=${{ secrets.COOLSMS_SENDER }}
