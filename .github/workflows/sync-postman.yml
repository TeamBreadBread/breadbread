name: Sync OpenAPI to Postman

on:
  push:
    branches:
      - main
      - 'feat-fe/**'
    paths:
      - 'apps/be/static/openapi.yaml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Install tools
        run: npm install -g openapi-to-postmanv2

      - name: Convert OpenAPI to Postman collection
        run: |
          openapi2postmanv2 \
            -s apps/be/static/openapi.yaml \
            -o /tmp/collection.json \
            --options '{"folderStrategy":"Tags","requestParametersResolution":"Example","includeAuthInfoInExample":true}'

      - name: Inject saved response examples for Mock Server
        run: node .github/scripts/inject-postman-examples.mjs

      - name: Update Postman collection
        run: |
          curl -s -X PUT \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}" \
            -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/collection.json
