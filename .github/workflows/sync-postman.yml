name: Sync OpenAPI to Postman

on:
  push:
    branches:
      - main
      - 'feat-fe/**'
    paths:
      - 'apps/be/static/openapi.yaml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm add -g openapi-to-postmanv2 && pnpm add js-yaml

      - name: Convert OpenAPI to Postman collection
        run: |
          openapi2postmanv2 \
            -s apps/be/static/openapi.yaml \
            -o /tmp/collection.json \
            -p -O folderStrategy=Tags,requestParametersResolution=Example

      - name: Convert OpenAPI YAML to JSON
        run: |
          node -e "
            const fs = require('fs');
            const yaml = require('./node_modules/js-yaml');
            const doc = yaml.load(fs.readFileSync('apps/be/static/openapi.yaml', 'utf8'));
            fs.writeFileSync('/tmp/openapi.json', JSON.stringify(doc));
          "

      - name: Inject saved response examples for Mock Server
        run: node .github/scripts/inject-postman-examples.mjs

      - name: Wrap collection for Postman API
        run: |
          echo "{\"collection\": $(cat /tmp/collection.json)}" > /tmp/postman-body.json

      - name: Update Postman collection
        run: |
          curl -s -X PUT \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}" \
            -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/postman-body.json
