steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'be/Dockerfile'
      - '-t'
      - '$_IMAGE_NAME'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_NAME'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE_NAME'
      - '--region=$_REGION'
      - '--platform=managed'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_NAME: 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teambreadbread-breadbread/bread-be:$COMMIT_SHA'
  _SERVICE_NAME: 'bread-be'
  _REGION: 'asia-northeast3'
